###############################################
################## LINKS ######################
###############################################
  links:
# PTP Links
    - endpoints: ["ptp-leaf1:eth3", "ptp-leaf2:eth3"]
    - endpoints: ["ptp-leaf1:eth4", "ptp-leaf2:eth4"]
    - endpoints: ["ptp-leaf1:eth5", "ptp-gm1:eth1"]
    - endpoints: ["ptp-leaf2:eth5", "ptp-gm2:eth1"]
# RED Leaf-Spine Links
    - endpoints: ["ptp-leaf1:eth1", "red-spine:eth1"]
    - endpoints: ["ptp-leaf1:eth2", "blue-spine:eth2"]
    - endpoints: ["red-rt-leaf1:eth1", "red-spine:eth3"]
    - endpoints: ["red-rt-leaf2:eth1", "red-spine:eth4"]
# BLUE Leaf-Spine Links
    - endpoints: ["ptp-leaf2:eth1", "blue-spine:eth1"]
    - endpoints: ["ptp-leaf2:eth2", "red-spine:eth2"]
    - endpoints: ["blue-rt-leaf1:eth1", "blue-spine:eth3"]
    - endpoints: ["blue-rt-leaf2:eth1", "blue-spine:eth4"]
# Host Facing Links
    - endpoints: ["media-host1:eth1", "red-rt-leaf1:eth2"]
    - endpoints: ["media-host1:eth2", "blue-rt-leaf1:eth2"]
    - endpoints: ["media-host2:eth1", "red-rt-leaf2:eth2"]
    - endpoints: ["media-host2:eth2", "blue-rt-leaf2:eth2"]
    - endpoints: ["media-host3:eth1", "red-rt-leaf1:eth3"]
    - endpoints: ["media-host3:eth2", "blue-rt-leaf1:eth3"]
    - endpoints: ["media-host4:eth1", "red-rt-leaf2:eth3"]
    - endpoints: ["media-host4:eth2", "blue-rt-leaf2:eth3"]
