name: AVD
prefix: ""

mgmt:
  network: MGMT
  ipv4-subnet: 172.16.255.0/24
  ipv6-subnet: 2001:db8:feed:beef::/64

topology:
  defaults:
    startup-delay: 5
  kinds:
    arista_ceos:
      image: arista/ceos:4.36.0F
  nodes:
    red-mcs:
      kind: arista_ceos
      mgmt-ipv4: 172.16.255.80
      mgmt-ipv6: 2001:db8:feed:beef::80
      startup-config: ../avd/intended/configs/red-mcs.cfg
      enforce-startup-config: true
      binds:
        - ../clab/sn/red-mcs.txt:/mnt/flash/ceos-config:ro
        - ../clab/cv-onboarding-token:/mnt/flash/cv-onboarding-token:ro
        - ../clab/eos-intf-mapping/ceos-lab_EosIntfMapping.json:/mnt/flash/EosIntfMapping.json:ro
      ports:
        - 5280:443/tcp
        - 4280:22/tcp
    blue-mcs:
      kind: arista_ceos
      mgmt-ipv4: 172.16.255.81
      mgmt-ipv6: 2001:db8:feed:beef::81
      startup-config: ../avd/intended/configs/blue-mcs.cfg
      enforce-startup-config: true
      binds:
        - ../clab/sn/blue-mcs.txt:/mnt/flash/ceos-config:ro
        - ../clab/cv-onboarding-token:/mnt/flash/cv-onboarding-token:ro
        - ../clab/eos-intf-mapping/ceos-lab_EosIntfMapping.json:/mnt/flash/EosIntfMapping.json:ro
      ports:
        - 5281:443/tcp
        - 4281:22/tcp
