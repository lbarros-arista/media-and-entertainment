!
no aaa root
!
username ansible privilege 15 role network-admin secret sha512 $6$7u4j1rkb3VELgcZE$EJt2Qff8kd/TapRoci0XaIZsL4tFzgq1YZBLD9c6f/knXzvcYY0NcMKndZeCv0T268knGKhOEwZAxqKjlMm920
!
management api http-commands
   no shutdown
   !
   vrf MGMT
      no shutdown
!
switchport default mode routed
!
no service interface inactive port-id allocation disabled
!
service routing protocols model multi-agent
!
hostname {{ .ShortName }}
ip name-server vrf MGMT 8.8.4.4
ip name-server vrf MGMT 8.8.8.8
!
platform tfa
   interface mode relaying
!
spanning-tree mode none
!
vrf instance MGMT
!
aaa authorization exec default local
!
interface Ethernet1
   description PTP_red-leaf1_Ethernet2
   mtu 9000
   speed 100g-1
   no switchport
   ip address 172.16.0.1/31
!
interface Ethernet2
   description PTP_blue-leaf1_Ethernet2
   mtu 9000
   speed 100g-1
   no switchport
   ip address 172.16.0.3/31
!
interface Management1
   vrf MGMT
   ipv6 enable
   {{ if .MgmtIPv4Address }}   ip address {{ .MgmtIPv4Address }}/{{ .MgmtIPv4PrefixLength }}{{end}}
   {{ if .MgmtIPv6Address }}   ip address {{ .MgmtIPv6Address }}/{{ .MgmtIPv6PrefixLength }}{{end}}
   no lldp transmit
   no lldp receive
!
ip routing
no ip routing vrf MGMT
!
ipv6 unicast-routing
!
ip route vrf MGMT 0.0.0.0/0 172.16.255.1
!
ipv6 route vrf MGMT ::/0 2001:db8:feed:beef::1
!
ntp local-interface vrf MGMT Management1
ntp server vrf MGMT 0.nl.pool.ntp.org prefer
ntp server vrf MGMT 1.nl.pool.ntp.org
ntp server vrf MGMT 2.nl.pool.ntp.org
ntp server vrf MGMT 3.nl.pool.ntp.org
!
router multicast
   ipv4
      routing
   !
   ipv6
      routing
!
end